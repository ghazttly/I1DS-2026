<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulárioo de contato</title>
</head>
<hr>
    <h3>Formulário Básico</h3>
    <form method="get" action="contato.html">
        <label>Nome</label>
        <input type="text" name="nome" placeholder="Digite seu nome..."  />
        <input type="submit" value="Enviar" /> <!-- Botão de Envio -->
    </form>
    <hr />
    <h3>Formulário de Cadastro</h3>
    <form method="get" action="#">
        <fielset>
            <legend>Dados Pessoais</legend>
            <label for="comeCompleto">Nome Completo</label>
            <input type="text" name="nomeCompleto" placeholder="Digite seu nome completo"/>
            <br />
            <label for="email">E-mail</label>
            <input type="email" name="email" placeholder="Digite seu email..."/>
            <br />

             <label for="cpf">CPF</label>
            <input type="number" name="cpf" placeholder="Digite seu CPF..."/>
            <br />
        </fielset>

        <button type="submit">Evinar Dados</button>
        <button type="reset">Limpar o Formulário</button>

        <fieldset>
            <legend>Outras Infromaçoes</legend>

            <label for="dataNascimento">Data de Nascimento</label>
            <input type="date" name="dataNascimento" />
            <br />

             <label for="dataCadastro">Data de Cadastro</label>
            <input type="datetime-local" name="dataCadastro" />
            <br />

            <input type="checkbox" name="escolaSesi"/>
            <label for="escolaSesi">SESI</label>

            <input type="checkbox" name="escolaSenai"/>
            <label for="escolaSesi">SENAI</label>

            <input type="checkbox" name="escola"/>
            <label for="escolaSesi">nenhuma</label>

            <br />

            <input type="radio" name="sexo"/>
            <label for="sexo"> Masculino</label>
            <input type="radio" name="sexo"/>
            <label for="sexo"> Feminino</label>
            <input type="radio" name="sexo"/>
            <label for="sexo"> Prefiro nao Informar</label>
            
            <br />

            <label for="curso">Escolha seu Curso</label>
            <select name="curso">
                <option value="0">HTML</option>
                <option value="1">CSS</option>
                <option value="2">JavaScript</option>
            </select>

            <br />

            <label for="comentarios">Comentários</label>
            <textarea name="comentarios" placeholder="Digite seu comentário..." rows="5" cols="100"></textarea>
        </fieldset>
    </form>
</body>
</html>
