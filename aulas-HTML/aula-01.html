<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--TAG de comentários -->
    <!-- titulos: h1 até h6-->
     <h1>titulo primario
     </h1>

     <h2>titulo nivel 2
     </h2>

     <h3>titulo nivel 3</h3>
     <h4>titulo nivel 4</h4>
     <h5>titulo nivel 5</h5>
     <h6>titulo nivel 6</h6>

     <p>tag para identificar um parágrafo de texto comum</p>

     <!-- TAG para listas: nao ordenadas-->
      <ul> 
        <li>item 1
        </li>
        <li>item 2
        </li>
        <li>item 3
        </li>
      </ul>

      <!-- tag para listas: ordenadas-->
      <ol> 
        <li>item 1
        </li>
        <li>item 2
        </li>
        <li>item 3
        </li>
      </ol>

  <!-- TAG para tabelas-->
     <table>
        <th>
            <td>nome</td>
            <td>idade</td>
            <td>e-mail</td>
        </th>
        <tr>
            <td>Terry</td>
            <td>23</td>
            <td>terry@email.com</td>
        </tr>
     </table>
     <img src="bisexyuai.png"/>
</body>
</html>
