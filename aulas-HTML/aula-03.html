<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML | Aula 03</title>
    <style> 
        .my-text{color:ivory}
        #header{background-color: crimson; height: 130px; text-align: center;}
         #main{background-color: lightpink; height: 380px;}
         #aside{background-color: cornflowerblue; height: 100%; width: 30%; float: left;}
         #content{background-color: palegreen; height: 100%; width: 70%; float: right;}
         #footer{background-color: lightslategray; height: 50px;}
    </style>
</head>
<body>
    <!-- div: divisão de conteúdo -->
    <div id="header">
        <h1 class="my-text">conteudo do cabecalho</h1>
    </div>
    <div id="main">
         <h2>conteudo da barra lateral</h2>
        <div id="aside">
             <h2 class="my-text">conteudo da barra lateral</h2>
        </div>
        <div id="content">
            <h2 class="my-text">conteudo principal</h2>
        </div>
    </div>
    <div id="footer">
        <h2 class="my-text">conteudo do rodape</h2>
    </div>

</body>
</html>
